<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionTrack AI | Register</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .reg-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 450px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .camera-box {
            width: 100%;
            height: 250px;
            background: #000;
            margin: 20px 0;
            border-radius: 10px;
            border: 2px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .capture-btn {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .scan-overlay {
            position: absolute;
            width: 180px;
            height: 180px;
            border: 2px solid rgba(56, 189, 248, 0.5);
            border-radius: 50%;
        }
    </style>
</head>
<script>
    async function startCamera() {
    const name = document.querySelector('input[placeholder*="Full Name"]').value;
    const img = document.getElementById('video-stream');
    
    if (!name) {
        alert("Please enter a name first!");
        return;
    }

    // 1. Show the live camera feed
    img.src = "/video_feed";
    img.style.display = "block";

    // 2. Tell Python to start saving 20 samples
    const response = await fetch(`/start_collection/${name}`);
    
    if (response.ok) {
        // 3. Move to the next page (Dashboard) automatically
        alert("Face data collected successfully!");
        window.location.href = "/dashboard";
    }
}
    
</script>
<body>

    <div class="reg-card">
        <h2 style="color: var(--accent); margin-top: 0;">New Face Enrollment</h2>
        <p style="font-size: 14px; opacity: 0.7;">Fill details to train the AI model</p>
        
        <input type="text" placeholder="Full Name (e.g., Gauri Barot)">
        <input type="text" placeholder="Roll Number / Student ID">
        
        <div class="camera-box">
            <div class="camera-box">
    <img id="video-stream" src="" style="display:none; width: 100%; border-radius: 10px; transform: scaleX(-1);" />
    
    <div class="scan-line"></div>
</div>
            <div class="scan-overlay"></div>
            <p style="font-size: 12px; color: var(--accent);">Waiting for Camera Input...</p>
        </div>

        <button class="capture-btn" onclick="startCamera()">START BIOMETRIC SCAN</button>
        <p style="font-size: 11px; margin-top: 15px; opacity: 0.5;">* 20 samples will be collected for dataset training</p>
    </div>

</body>
</html>
