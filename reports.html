<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionTrack AI | Reports</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --accent: #38bdf8;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid var(--accent);
            text-align: center;
        }

        .stat-card h3 { font-size: 2rem; margin: 10px 0; color: var(--accent); }

        .chart-container {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bar-row {
            margin: 20px 0;
        }

        .bar-label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }

        .bar-bg { width: 100%; height: 12px; background: #334155; border-radius: 6px; overflow: hidden; }

        .bar-fill { height: 100%; background: linear-gradient(to right, var(--primary), var(--accent)); }

        .btn-export {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            float: right;
        }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="color: var(--accent);">Monthly Attendance Analytics</h2>
        <button class="btn-export">Download PDF Report</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <p>Avg. Accuracy</p>
            <h3>99.2%</h3>
        </div>
        <div class="stat-card" style="border-left-color: #22c55e;">
            <p>Present Today</p>
            <h3>84%</h3>
        </div>
        <div class="stat-card" style="border-left-color: var(--warning);">
            <p>Late Entries</p>
            <h3>05</h3>
        </div>
        <div class="stat-card">
            <p>Faces in DB</p>
            <h3>124</h3>
        </div>
    </div>

    <div class="chart-container">
        <h3>Weekly Recognition Trends</h3>
        
        <div class="bar-row">
            <div class="bar-label"><span>Monday</span><span>92%</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width: 92%;"></div></div>
        </div>

        <div class="bar-row">
            <div class="bar-label"><span>Tuesday</span><span>88%</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width: 88%;"></div></div>
        </div>

        <div class="bar-row">
            <div class="bar-label"><span>Wednesday</span><span>95%</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width: 95%;"></div></div>
        </div>

        <div class="bar-row">
            <div class="bar-label"><span>Thursday</span><span>84%</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width: 84%;"></div></div>
        </div>
    </div>

</body>
</html>
